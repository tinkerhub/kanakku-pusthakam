<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Makerspace</title>
  </head>
  <body style="margin:0;background:#f5f5f5;color:#111111;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f5f5;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="max-width:640px;width:100%;background:#ffffff;">
            <tr>
              <td style="background:#111111;color:#FBB905;padding:24px 32px;font-size:24px;font-weight:700;">
                Makerspace
              </td>
            </tr>
            <tr>
              <td style="padding:32px;color:#111111;font-size:16px;line-height:1.5;">
                {% block body %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="background:#FBB905;color:#111111;padding:16px 32px;font-size:13px;">
                Makerspace 3D Printing
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
