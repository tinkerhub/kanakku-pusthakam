services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-makerspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-makerspace_manager}
    volumes:
      - makerspace_manager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-makerspace} -d ${POSTGRES_DB:-makerspace_manager}"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_BIND:-0.0.0.0}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-evidence}
      PUBLIC_IMAGE_BUCKET: ${PUBLIC_IMAGE_BUCKET:-public-images}
      MINIO_CORS_ALLOWED_ORIGINS_JSON: '${MINIO_CORS_ALLOWED_ORIGINS_JSON:-["http://localhost"]}'
    entrypoint: |
      /bin/sh -c '
      until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done;
      mc mb --ignore-existing "local/$$AWS_STORAGE_BUCKET_NAME";
      mc anonymous set none "local/$$AWS_STORAGE_BUCKET_NAME";
      cat > /tmp/cors.json <<EOF
      [
        {
          "AllowedOrigins": $$MINIO_CORS_ALLOWED_ORIGINS_JSON,
          "AllowedMethods": ["PUT", "POST", "GET", "HEAD"],
          "AllowedHeaders": ["*"],
          "ExposeHeaders": ["ETag"],
          "MaxAgeSeconds": 3000
        }
      ]
      EOF
      mc cors set "local/$$AWS_STORAGE_BUCKET_NAME" /tmp/cors.json;
      mc mb --ignore-existing "local/$$PUBLIC_IMAGE_BUCKET";
      mc anonymous set download "local/$$PUBLIC_IMAGE_BUCKET";
      mc cors set "local/$$PUBLIC_IMAGE_BUCKET" /tmp/cors.json;
      '

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    image: ${MAKERSPACE_BACKEND_IMAGE:-ghcr.io/tinkerhub/kanakku-pusthakam-backend}:${MAKERSPACE_IMAGE_TAG:-latest}
    environment: &backend-env
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?set ALLOWED_HOSTS}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-makerspace}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-makerspace_manager}}
      MANAGED_POSTGRES: ${MANAGED_POSTGRES:-False}
      CONN_MAX_AGE: ${CONN_MAX_AGE:-0}
      DISABLE_SERVER_SIDE_CURSORS: ${DISABLE_SERVER_SIDE_CURSORS:-False}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      API_CLIENT_ENC_KEY: ${API_CLIENT_ENC_KEY:-}
      # Security hardening. Keep ENABLE_HTTPS=false for this HTTP-behind-nginx stack;
      # set it true only when a TLS proxy forwards X-Forwarded-Proto: https.
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
      TRUST_X_FORWARDED_PROTO: ${TRUST_X_FORWARDED_PROTO:-false}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      AXES_FAILURE_LIMIT: ${AXES_FAILURE_LIMIT:-5}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Kanakku Pusthakam <noreply@example.com>}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-evidence}
      PUBLIC_IMAGE_BUCKET: ${PUBLIC_IMAGE_BUCKET:-public-images}
      PUBLIC_IMAGE_BASE_URL: ${PUBLIC_IMAGE_BASE_URL:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_PUBLIC_ENDPOINT_URL: ${AWS_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      STORAGE_PRESIGN_METHOD: ${STORAGE_PRESIGN_METHOD:-post}
      CRON_SECRET: ${CRON_SECRET:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/readiness/', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  worker:
    image: ${MAKERSPACE_BACKEND_IMAGE:-ghcr.io/tinkerhub/kanakku-pusthakam-backend}:${MAKERSPACE_IMAGE_TAG:-latest}
    environment: *backend-env
    command: celery -A config worker -l info
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Gate on the backend being healthy: it runs `migrate` at start, so the worker
      # never consumes tasks against an unmigrated schema.
      backend:
        condition: service_healthy

  frontend:
    image: ${MAKERSPACE_FRONTEND_IMAGE:-ghcr.io/tinkerhub/kanakku-pusthakam-frontend}:${MAKERSPACE_IMAGE_TAG:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      backend:
        condition: service_healthy

volumes:
  makerspace_manager_pgdata:
  minio_data:
