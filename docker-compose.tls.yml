services:
  backend:
    environment:
      ENABLE_HTTPS: "true"
      TRUST_X_FORWARDED_PROTO: "true"
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?set CSRF_TRUSTED_ORIGINS}

  frontend:
    ports: !reset []
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?set PUBLIC_DOMAIN}
    ports:
      - "${TLS_HTTP_PORT:-80}:80"
      - "${TLS_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
