services:
  db:
    image: postgres:16
    container_name: tinkerspace-db
    environment:
      POSTGRES_USER: tinker
      POSTGRES_PASSWORD: tinker
      POSTGRES_DB: tinkerspace
    ports:
      - "5432:5432"
    volumes:
      - tinkerspace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinker -d tinkerspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tinkerspace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: tinkerspace-minio-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c '
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/evidence;
      mc anonymous set none local/evidence;
      cat > /tmp/cors.json <<EOF
      [
        {
          "AllowedOrigins": ["http://localhost:5000", "http://localhost:5173"],
          "AllowedMethods": ["PUT", "POST", "GET", "HEAD"],
          "AllowedHeaders": ["*"],
          "ExposeHeaders": ["ETag"],
          "MaxAgeSeconds": 3000
        }
      ]
      EOF
      mc cors set local/evidence /tmp/cors.json;
      '

  # Signed-URL dev is host-only this phase; backend is intentionally not wired to MinIO.
  backend:
    build:
      context: ./backend
    container_name: tinkerspace-backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DATABASE_URL: ${DATABASE_URL:-postgres://tinker:tinker@db:5432/tinkerspace}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      HMAC_CLIENT_ID: ${HMAC_CLIENT_ID:-}
      HMAC_SECRET: ${HMAC_SECRET:-}
      HMAC_MAX_CLOCK_SKEW_SECONDS: ${HMAC_MAX_CLOCK_SKEW_SECONDS:-300}
      HMAC_PROTECTED_PATH_PREFIXES: ${HMAC_PROTECTED_PATH_PREFIXES:-/api/public/,/api/v1/public/}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_HMAC_CLIENT_ID: ${VITE_HMAC_CLIENT_ID:-}
        VITE_HMAC_SECRET: ${VITE_HMAC_SECRET:-}
    container_name: tinkerspace-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  tinkerspace_pgdata:
  minio_data:
