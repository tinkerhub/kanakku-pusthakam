services:
  db:
    image: postgres:16
    container_name: makerspace-manager-db
    environment:
      POSTGRES_USER: makerspace
      POSTGRES_PASSWORD: makerspace
      POSTGRES_DB: makerspace_manager
    ports:
      - "5432:5432"
    volumes:
      - makerspace_manager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makerspace -d makerspace_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: makerspace-manager-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: makerspace-manager-minio-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c '
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/evidence;
      mc anonymous set none local/evidence;
      cat > /tmp/cors.json <<EOF
      [
        {
          "AllowedOrigins": ["http://localhost", "http://localhost:5000", "http://localhost:5173"],
          "AllowedMethods": ["PUT", "POST", "GET", "HEAD"],
          "AllowedHeaders": ["*"],
          "ExposeHeaders": ["ETag"],
          "MaxAgeSeconds": 3000
        }
      ]
      EOF
      mc cors set local/evidence /tmp/cors.json;
      '

  # Backend is wired to MinIO for dev: it SIGNS presigned upload/view URLs with the
  # public endpoint (browser-reachable localhost:9000) and talks to MinIO server-side
  # over the internal endpoint (minio:9000). Empty creds would make every presigned
  # POST 403 at MinIO, so the root creds are supplied here.
  backend:
    build:
      context: ./backend
    container_name: makerspace-manager-backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DATABASE_URL: ${DATABASE_URL:-postgres://makerspace:makerspace@db:5432/makerspace_manager}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      # Dev serves the frontend same-origin behind nginx over plain http://localhost, where a
      # SameSite=None/Secure=True cookie (the prod default) is silently dropped by browsers,
      # so the 7-day refresh session never persists. Lax + non-secure makes it stick in dev.
      # Production (HTTPS, separate origins) keeps the secure defaults via its own env.
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-False}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-Lax}
      # S3/MinIO: internal endpoint for server-side calls, public endpoint for the
      # presigned URLs the browser uses. Creds must match the minio service root user.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-evidence}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_PUBLIC_ENDPOINT_URL: ${AWS_S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      HMAC_CLIENT_ID: ${HMAC_CLIENT_ID:-}
      HMAC_SECRET: ${HMAC_SECRET:-}
      HMAC_MAX_CLOCK_SKEW_SECONDS: ${HMAC_MAX_CLOCK_SKEW_SECONDS:-300}
      HMAC_PROTECTED_PATH_PREFIXES: ${HMAC_PROTECTED_PATH_PREFIXES:-/api/public/,/api/v1/public/}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Makerspace <noreply@makerspace.local>}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_TENANT_TOKEN: ${VITE_TENANT_TOKEN:-}
        VITE_PUBLIC_API_KEY: ${VITE_PUBLIC_API_KEY:-}
        VITE_PUBLIC_CLIENT_ID: ${VITE_PUBLIC_CLIENT_ID:-}
    environment:
      TENANT_API_URL: ${TENANT_API_URL:-/api}
      TENANT_TOKEN: ${TENANT_TOKEN:-}
    container_name: makerspace-manager-frontend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      backend:
        condition: service_healthy

volumes:
  makerspace_manager_pgdata:
  minio_data:
