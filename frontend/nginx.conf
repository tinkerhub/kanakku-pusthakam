# If a TLS-terminating proxy sits in front, keep the proto it forwarded; otherwise use
# this hop's scheme. Required so ENABLE_HTTPS=true does not cause an HTTPS redirect loop.
#
# SECURITY: this trusts an inbound X-Forwarded-Proto header. That is only safe when this
# container's HTTP port is reachable ONLY through a trusted TLS proxy. When ENABLE_HTTPS=true,
# do NOT publish this port publicly (bind it to the proxy / a private network) — otherwise a
# client hitting :80 directly could send "X-Forwarded-Proto: https" and bypass SSL redirect.
# In the default ENABLE_HTTPS=false setup there is no SSL redirect, so the header is harmless.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~.+"   $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # The Django control plane (/control/) is intentionally NOT exposed on this
    # public frontend port. It is reachable only via direct backend access.

    # Static assets for the admin + API docs (served by WhiteNoise on the backend).
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # API documentation (drf-spectacular Swagger UI / Redoc / schema).
    location ~ ^/(docs|redoc|schema)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
